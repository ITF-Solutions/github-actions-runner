name: Build and push runner image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/itf-solutions/github-actions-runner
          tags: |
            type=raw,value=base
            type=raw,value=base-${{ github.sha }}

      - name: Build and push base
        uses: docker/build-push-action@v7
        with:
          context: dockerfiles/base
          file: dockerfiles/base/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-deploy:
    needs: build-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/itf-solutions/github-actions-runner
          tags: |
            type=raw,value=deploy
            type=raw,value=deploy-${{ github.sha }}

      - name: Build and push deploy
        uses: docker/build-push-action@v7
        with:
          context: dockerfiles/deploy
          file: dockerfiles/deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
